version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
      - run:
          name: Run unit tests
          command: python -m unittest discover tests

workflows:
  test:
    jobs:
      - test
